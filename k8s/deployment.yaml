apiVersion: apps/v1
kind: Deployment
metadata:
  name: agente-app
  namespace: agente
  labels:
    app: agente-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agente-app
  template:
    metadata:
      labels:
        app: agente-app
    spec:
      containers:
        - name: agente-app
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
